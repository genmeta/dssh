[package]
name = "genmeta-ssh3-server"
version = "0.3.0"
edition = "2024"

[dependencies]
h3x = { workspace = true }
nix = { workspace = true, features = ["fs", "ioctl", "process", "signal", "socket", "term", "user"] }
pam-client2 = { workspace = true, optional = true }
proto = { workspace = true }
remoc = { workspace = true }
snafu = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

[features]
default = ["pam"]
pam = ["dep:pam-client2"]
