[workspace]
resolver = "3"
members = [
    "ssh-config",
    "genmeta-ssh3-client",
    "genmeta-ssh3-proto",
    "genmeta-ssh3-server",
]

[workspace.dependencies]
bytes = { version = "1", features = ["serde"] }
ciborium = "0.2"
derive_more = "2"
dirs = "6"
either = "1"
futures = "0.3"
gm-quic = { path = "../../reimu/gm-quic/gm-quic" }
h3x = { path = "../h3x" }
http = "1"
nix = "0.30"
pam-client2 = { git = "ssh://git@github.com/eareimu/pam-client.git" }
peg = "0.8"
pin-project-lite = "0.2"
regex = "1"
regex-syntax = "0.8"
remoc = { version = "0.14", features = ["serde", "codec-bincode"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "logging", "std"] }
serde = { version = "1", features = ["derive"] }
snafu = "0.8"
tokio = "1"
tokio-util = { version = "0.7" }
tracing = { version = "0.1", default-features = false, features = [
    "std",
    "attributes",
] }
tracing-appender = "0.2"
tracing-subscriber = "0.3"

proto = { path = "genmeta-ssh3-proto", package = "genmeta-ssh3-proto" }
