[workspace]
resolver = "3"
members = [
    "ssh-config",
    "genmeta-ssh3-client",
    "genmeta-ssh3-proto",
    "genmeta-ssh3-server",
]

[workspace.dependencies]
bytes = { version = "1", features = ["serde"] }
crossterm = "0.29"
dashmap = "6"
derive_more = "2"
dirs = "6"
either = "1"
futures = "0.3"
http = "1"
nix = "0.30"
pam-client2 = { version = "0.5", default-features = false }
peg = "0.8"
pin-project-lite = "0.2"
regex = "1"
regex-syntax = "0.8"
rpassword = "7"
serde = { version = "1", features = ["derive"] }
serde_cbor = "0.11"
snafu = "0.8"
socks5-proto = "0.4"
socket2 = "0.5"
tokio = "1"
tokio-util = { version = "0.7" }
tracing = { version = "0.1", default-features = false, features = [
    "std",
    "attributes",
] }


proto = { path = "genmeta-ssh3-proto", package = "genmeta-ssh3-proto" }
